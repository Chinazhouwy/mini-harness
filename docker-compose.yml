version: '3.8'

services:
  # Redis 8.0 - 热数据 + 向量存储
  redis:
    image: redis:8.0-rc1-alpine
    container_name: harness-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Kafka - A2A 通信
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: harness-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: harness-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - 温数据
  postgres:
    image: postgres:16-alpine
    container_name: harness-postgres
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness123
      POSTGRES_DB: harness_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - 文档存储
  mongodb:
    image: mongo:7.0
    container_name: harness-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: harness
      MONGO_INITDB_ROOT_PASSWORD: harness123
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse - 时序数据
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: harness-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB 2 - 时序数据（Tick 行情）
  influxdb:
    image: influxdb:2.7
    container_name: harness-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: harness
      DOCKER_INFLUXDB_INIT_PASSWORD: harness123
      DOCKER_INFLUXDB_INIT_ORG: agentic-harness
      DOCKER_INFLUXDB_INIT_BUCKET: market_data
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - 冷数据存储
  minio:
    image: minio/minio:RELEASE.2024-03-03T17-50-39Z
    container_name: harness-minio
    ports:
      - "9001:9001"
      - "9002:9002"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: harness
      MINIO_ROOT_PASSWORD: harness12345
    command: server /data --console-address ":9001" --address ":9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RocketMQ - 订单消息
  rmqnamesrv:
    image: apache/rocketmq:5.1.4
    container_name: harness-rmqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - rmqnamesrv-logs:/home/rocketmq/logs
    command: sh mqnamesrv

  rmqbroker:
    image: apache/rocketmq:5.1.4
    container_name: harness-rmqbroker
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - rmqbroker-logs:/home/rocketmq/logs
      - rmqbroker-store:/home/rocketmq/store
      - ./config/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    command: sh mqbroker -n rmqnamesrv:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    depends_on:
      - rmqnamesrv

  # Neo4j - 二期：因果图谱
  neo4j:
    image: neo4j:5.15-community
    container_name: harness-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      NEO4J_AUTH: neo4j/harness123
      NEO4J_PLUGINS: '["apoc", "gds"]'
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "harness123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SkyWalking OAP - 可观测性
  oap:
    image: apache/skywalking-oap-server:10.0.1
    container_name: harness-skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    environment:
      SW_HEALTH_CHECKER: default
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:12800/internal/l7check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SkyWalking UI
  skywalking-ui:
    image: apache/skywalking-ui:10.0.1
    container_name: harness-skywalking-ui
    ports:
      - "8080:8080"
    environment:
      SW_OAP_ADDRESS: http://oap:12800
    depends_on:
      - oap

  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: harness-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:10.3.1
    container_name: harness-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
  mongodb-data:
  clickhouse-data:
  influxdb-data:
  minio-data:
  rmqnamesrv-logs:
  rmqbroker-logs:
  rmqbroker-store:
  neo4j-data:
  prometheus-data:
  grafana-data:
