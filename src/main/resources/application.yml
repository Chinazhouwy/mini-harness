spring:
  ai:
    openai:
      # 这个配置供 Spring Boot 自动装配的 ChatModel 使用。
      # 当前控制台 Demo 为了讲清手工构建过程，自己创建 OpenAIClient 和 OpenAiChatModel；
      # 两种写法并存是学习用途，后续做正式应用时再统一其中一种。
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash

logging:
  level:
    com.chinazhouwy.miniharness: DEBUG
    # Spring AI 原生的 SimpleLoggerAdvisor 会在 DEBUG 级别打印已经组装好的
    # ChatClientRequest（包含 Prompt 和历史消息）及 ChatResponse。
    # 它会包含用户输入，只适合本地 Demo；不要直接复制到生产环境。
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
