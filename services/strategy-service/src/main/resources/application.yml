server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

spring:
  datasource:
    url: jdbc:clickhouse://localhost:8123/quant
    username: default
    password: ''
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: com.clickhouse.hibernate.dialect.ClickHouseDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

reference:
  store:
    # memory: 默认演示模式；jdbc: 启用 PostgreSQL 持久化
    type: ${REFERENCE_STORE_TYPE:memory}
  postgres:
    url: ${REFERENCE_POSTGRES_URL:jdbc:postgresql://localhost:5432/harness_db}
    username: ${REFERENCE_POSTGRES_USERNAME:harness}
    password: ${REFERENCE_POSTGRES_PASSWORD:harness123}
