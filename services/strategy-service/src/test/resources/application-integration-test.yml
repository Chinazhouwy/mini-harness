spring:
  datasource:
    # 默认值仅作为兜底；测试运行时由 Testcontainers 动态注入
    url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/harness_db}
    username: ${CLICKHOUSE_USERNAME:default}
    password: ${CLICKHOUSE_PASSWORD:harness123}
    driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: none # 使用SQL脚本初始化
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true

  sql:
    init:
      mode: never

logging:
  level:
    com.clickhouse: INFO
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
    org.testcontainers: INFO
    com.quant.strategy: DEBUG
